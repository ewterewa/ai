<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENERGY.AI JUNIOR — Умный ассистент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 600px;
        }

        /* Левая панель */
        .sidebar {
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #e9ecef;
        }

        .personality-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            color: #6c757d;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .personality-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
            font-size: 16px;
            font-weight: 500;
        }

        .personality-btn.active {
            border-color: #667eea;
            background: #f0f3ff;
            box-shadow: 0 4px 12px rgba(102,126,234,0.2);
        }

        .personality-btn small {
            display: block;
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
            font-weight: normal;
        }

        .voice-settings {
            margin-bottom: 30px;
        }

        .voice-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .voice-btn.active {
            background: #e7f3ff;
            border-color: #667eea;
        }

        .voice-btn i {
            width: 20px;
            color: #667eea;
        }

        .status-indicator {
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #495057;
            font-size: 14px;
        }

        .status-item i {
            color: #667eea;
        }

        /* Правая панель - чат */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }

        .message.bot .message-content {
            background: #f0f3ff;
            color: #1a1a1a;
            border-bottom-left-radius: 4px;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #adb5bd;
            margin-top: 5px;
            text-align: right;
        }

        .input-area {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            font-size: 14px;
            transition: 0.2s;
            outline: none;
        }

        .input-area input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .input-area button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-area button:hover {
            transform: scale(1.1);
            background: #5a67d8;
        }

        .mic-btn {
            background: #48bb78 !important;
        }

        .mic-btn.listening {
            animation: pulse 1s infinite;
            background: #f56565 !important;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .welcome-message {
            text-align: center;
            color: #6c757d;
            padding: 40px;
        }

        .welcome-message i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }
    </style>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ENERGY.AI JUNIOR</h1>
            <p>Умный ассистент по энергоэффективности</p>
        </div>

        <div class="main-content">
            <!-- Левая панель -->
            <div class="sidebar">
                <div class="personality-section">
                    <div class="section-title">Выберите стиль общения</div>
                    <button class="personality-btn active" data-personality="friend">
                        🤝 Друг
                        <small>Простой и дружелюбный</small>
                    </button>
                    <button class="personality-btn" data-personality="expert">
                        👨‍🔬 Эксперт
                        <small>Профессиональный и точный</small>
                    </button>
                    <button class="personality-btn" data-personality="motivator">
                        💪 Мотиватор
                        <small>Энергичный и позитивный</small>
                    </button>
                    <button class="personality-btn" data-personality="teacher">
                        👩‍🏫 Наставник
                        <small>Обучающий и подробный</small>
                    </button>
                </div>

                <div class="voice-settings">
                    <div class="section-title">Голос ассистента</div>
                    <button class="voice-btn active" data-voice="ru-RU-male">
                        <i class="fas fa-user"></i>
                        Александр (мужской)
                    </button>
                    <button class="voice-btn" data-voice="ru-RU-female">
                        <i class="fas fa-user-circle"></i>
                        Елена (женский)
                    </button>
                    <button class="voice-btn" data-voice="en-US-male">
                        <i class="fas fa-globe"></i>
                        John (English)
                    </button>
                </div>

                <div class="status-indicator">
                    <div class="status-item">
                        <i class="fas fa-microphone"></i>
                        <span id="speechStatus">Готов к работе</span>
                    </div>
                    <div class="status-item" style="margin-top: 10px;">
                        <i class="fas fa-comment"></i>
                        <span id="personalityStatus">Режим: Друг</span>
                    </div>
                </div>
            </div>

            <!-- Правая панель - чат -->
            <div class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message" id="welcomeMessage">
                        <i class="fas fa-robot"></i>
                        <h3>Привет! Я ENERGY.AI</h3>
                        <p>Задай любой вопрос о проекте, энергоэффективности или просто поболтай со мной</p>
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Напишите сообщение..." onkeypress="if(event.key === 'Enter') sendMessage()">
                    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <button onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ГОЛОСА ====================
        let synth = window.speechSynthesis;
        let currentVoice = 'ru-RU-male';
        let voices = [];
        
        // Загружаем голоса
        function loadVoices() {
            voices = synth.getVoices();
        }
        
        if (synth) {
            loadVoices();
            if (speechSynthesis.onvoiceschanged !== undefined) {
                speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        function speak(text) {
            if (!synth) {
                alert('Синтез речи не поддерживается в вашем браузере');
                return;
            }

            synth.cancel(); // Останавливаем предыдущую речь

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Настройки голоса
            utterance.rate = 0.9; // Немного медленнее
            utterance.pitch = 1;
            utterance.volume = 1;
            
            // Выбираем голос
            if (voices.length > 0) {
                if (currentVoice === 'ru-RU-male') {
                    // Ищем мужской русский голос
                    const ruMaleVoice = voices.find(v => v.lang.includes('ru') && v.name.includes('Alexander'));
                    utterance.voice = ruMaleVoice || voices.find(v => v.lang.includes('ru'));
                } else if (currentVoice === 'ru-RU-female') {
                    // Ищем женский русский голос
                    const ruFemaleVoice = voices.find(v => v.lang.includes('ru') && v.name.includes('Milena'));
                    utterance.voice = ruFemaleVoice || voices.find(v => v.lang.includes('ru'));
                } else {
                    // Английский голос
                    utterance.voice = voices.find(v => v.lang.includes('en'));
                }
            }
            
            utterance.lang = currentVoice.includes('ru') ? 'ru-RU' : 'en-US';
            
            synth.speak(utterance);
        }

        // ==================== РАСПОЗНАВАНИЕ РЕЧИ ====================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'ru-RU';
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                sendMessage();
            };
            
            recognition.onerror = (event) => {
                console.error('Ошибка:', event.error);
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('speechStatus').innerHTML = '❌ Ошибка распознавания';
            };
            
            recognition.onend = () => {
                document.getElementById('micBtn').classList.remove('listening');
                document.getElementById('speechStatus').innerHTML = 'Готов к работе';
            };
        }

        function toggleListening() {
            if (!recognition) {
                alert('Распознавание речи не поддерживается. Используйте Chrome или Edge.');
                return;
            }
            
            const micBtn = document.getElementById('micBtn');
            if (micBtn.classList.contains('listening')) {
                recognition.stop();
                micBtn.classList.remove('listening');
                document.getElementById('speechStatus').innerHTML = 'Готов к работе';
            } else {
                recognition.start();
                micBtn.classList.add('listening');
                document.getElementById('speechStatus').innerHTML = '🎤 Слушаю...';
            }
        }

        // ==================== БАЗА ЗНАНИЙ ====================
        const knowledgeBase = {
            friend: {
                patterns: {
                    'привет|здравствуй|добрый': 'Привет! Рад тебя видеть! Как дела?',
                    'что ты умеешь|что можешь': 'Я могу рассказать о проекте ENERGY.AI, помочь с вопросами по энергоэффективности или просто поболтать!',
                    'energy|проект|что это': 'ENERGY.AI JUNIOR — это платформа для мониторинга энергопотребления. Мы помогаем бизнесу экономить до 30% на электричестве!',
                    'экономия|сколько экономим': 'Наши клиенты экономят от 15 до 25% на счетах за электричество. А ты хочешь попробовать?',
                    'как работает|принцип': 'Всё просто: ставим датчики → собираем данные → AI анализирует → даём рекомендации. Без замены оборудования!',
                    'цена|сколько стоит|стоимость': 'Подписка от 12 000 ₽/мес. А для первых клиентов у нас бесплатный пилотный проект!',
                    'клиенты|кто пользуется': 'Уже работаем с кафе "24/42" и ООО "Дэлли групп" в Санкт-Петербурге. Хочешь стать следующим?',
                    'контакты|связаться': 'Пиши на energy.ai@mail.ru или в VK vk.com/energy.ai.junior. Всегда на связи!',
                    'спасибо|благодарю': 'Пожалуйста! Обращайся ещё 😊',
                    'пока|до свидания': 'Пока! Буду ждать новых вопросов!'
                },
                default: 'Интересно... Расскажи подробнее, а я помогу чем смогу!'
            },
            
            expert: {
                patterns: {
                    'привет|здравствуй': 'Здравствуйте. Я эксперт по энергоэффективности. Чем могу помочь?',
                    'экономия': 'По нашим данным, среднее снижение энергозатрат составляет 18.5% после 3 месяцев использования.',
                    'технологии': 'В основе платформы: IoT-датчики, облачная инфраструктура и нейросети для прогнозирования.',
                    'окупаемость': 'Срок окупаемости варьируется от 6 до 18 месяцев в зависимости от масштаба предприятия.',
                    'внедрение': 'Стандартный цикл внедрения: аудит (3-5 дней), установка (5-7 дней), настройка AI (7-10 дней).',
                    'точность': 'Точность прогнозов AI-моделей достигает 95% после обучения на данных конкретного объекта.'
                },
                default: 'Позвольте проанализировать этот вопрос. Можете уточнить детали?'
            },
            
            motivator: {
                patterns: {
                    'привет': 'Йоу! Готов менять мир к лучшему? Вместе мы справимся! 🔥',
                    'экономия': 'Каждый сэкономленный рубль — это шаг к успеху! Давай посчитаем, сколько сможешь сэкономить ты!',
                    'цели': 'Ставь амбициозные цели! Мы поможем их достичь!',
                    'сложно': 'Ничего сложного! Главное — начать, а я помогу на каждом шагу!',
                    'спасибо': 'Обращайся! Вместе мы сила! 💪'
                },
                default: 'Отличный вопрос! Давай разбираться и двигаться вперёд!'
            },
            
            teacher: {
                patterns: {
                    'привет': 'Здравствуй! Сегодня узнаем что-то новое об энергоэффективности. Готов?',
                    'как работает': 'Отличный вопрос! Давай разберём по шагам. Сначала устанавливаются датчики...',
                    'почему': 'Правильный вопрос! В основе лежит физический закон сохранения энергии...',
                    'что такое': 'С точки зрения физики, энергия — это способность совершать работу. А мы учимся использовать её эффективно.'
                },
                default: 'Попробуем разобраться вместе. Что именно тебя интересует?'
            }
        };

        // ==================== ЧАТ ====================
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const welcomeMsg = document.getElementById('welcomeMessage');
            if (welcomeMsg) welcomeMsg.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            
            contentDiv.appendChild(timeDiv);
            messageDiv.appendChild(contentDiv);
            messagesDiv.appendChild(messageDiv);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function getBotResponse(message) {
            message = message.toLowerCase();
            
            // Получаем текущий стиль
            const personality = document.querySelector('.personality-btn.active').dataset.personality;
            const botData = knowledgeBase[personality] || knowledgeBase.friend;
            
            // Ищем совпадения
            for (let pattern in botData.patterns) {
                const regex = new RegExp(pattern, 'i');
                if (regex.test(message)) {
                    return botData.patterns[pattern];
                }
            }
            
            return botData.default;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            // Ответ бота
            setTimeout(() => {
                const response = getBotResponse(message);
                addMessage(response, 'bot');
                speak(response);
            }, 500);
        }

        // ==================== ВЫБОР СТИЛЯ ====================
        document.querySelectorAll('.personality-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.personality-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const personality = btn.dataset.personality;
                let status = '';
                switch(personality) {
                    case 'friend': status = 'Режим: Друг'; break;
                    case 'expert': status = 'Режим: Эксперт'; break;
                    case 'motivator': status = 'Режим: Мотиватор'; break;
                    case 'teacher': status = 'Режим: Наставник'; break;
                }
                document.getElementById('personalityStatus').innerHTML = status;
                
                // Приветствие при смене
                setTimeout(() => {
                    let greeting = '';
                    switch(personality) {
                        case 'friend': greeting = 'Привет! Я стал дружелюбнее. О чём поговорим?'; break;
                        case 'expert': greeting = 'Режим эксперта активирован. Задавайте вопросы.'; break;
                        case 'motivator': greeting = 'Йоу! Включаю режим максимальной энергии!'; break;
                        case 'teacher': greeting = 'Урок начинается! Чему хочешь научиться?'; break;
                    }
                    addMessage(greeting, 'bot');
                    speak(greeting);
                }, 300);
            });
        });

        // ==================== ВЫБОР ГОЛОСА ====================
        document.querySelectorAll('.voice-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentVoice = btn.dataset.voice;
            });
        });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        // Приветствие при загрузке
        setTimeout(() => {
            addMessage('Привет! Я ENERGY.AI. Спрашивай меня о проекте, экономии энергии или просто болтай!', 'bot');
        }, 1000);
    </script>
</body>
</html>
